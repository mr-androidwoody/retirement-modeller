<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retirement Simulator V2</title>

    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <main class="container">
      <h1>Retirement Simulator V2</h1>

      <section class="panel">
        <h2>Inputs</h2>

        <div class="input-grid">
          <div class="field">
            <label for="startPortfolio">Starting portfolio (£)</label>
            <input id="startPortfolio" type="text" inputmode="numeric" />
          </div>

          <div class="field field-with-slider">
            <label for="annualSpending">Annual spending (£)</label>
            <input id="annualSpending" type="text" inputmode="numeric" />
            <input
              id="annualSpendingSlider"
              type="range"
              min="10000"
              max="120000"
              step="1000"
            />
          </div>

          <div class="field field-with-slider">
            <label for="stockAllocation">Equity allocation (%)</label>
            <input
              id="stockAllocation"
              type="number"
              min="0"
              max="100"
              step="1"
            />
            <input
              id="stockAllocationSlider"
              type="range"
              min="0"
              max="100"
              step="1"
            />
          </div>

          <div class="field">
            <label for="bondAllocation">Bond allocation (%)</label>
            <input
              id="bondAllocation"
              type="number"
              min="0"
              max="100"
              step="1"
              readonly
            />
          </div>

          <div class="field">
            <label for="years">Simulation years</label>
            <input id="years" type="number" min="1" step="1" />
          </div>

          <div class="field">
            <label for="monteCarloRuns">Monte Carlo runs</label>
            <input id="monteCarloRuns" type="text" inputmode="numeric" />
          </div>

          <div class="field">
            <label for="seed">Random seed</label>
            <input id="seed" type="number" min="1" step="1" />
          </div>

          <div class="field">
            <label for="inflation">Inflation (%)</label>
            <input id="inflation" type="number" min="0" step="0.1" />
          </div>

          <div class="field">
            <label for="person1Age">Person 1 age</label>
            <input id="person1Age" type="number" min="1" step="1" />
          </div>

          <div class="field">
            <label for="person2Age">Person 2 age</label>
            <input id="person2Age" type="number" min="1" step="1" />
          </div>

          <div class="field">
            <label for="person1StatePensionAge">Person 1 state pension age</label>
            <input
              id="person1StatePensionAge"
              type="number"
              min="1"
              step="1"
            />
          </div>

          <div class="field">
            <label for="person2StatePensionAge">Person 2 state pension age</label>
            <input
              id="person2StatePensionAge"
              type="number"
              min="1"
              step="1"
            />
          </div>

          <div class="field">
            <label for="statePensionToday">State pension today (£)</label>
            <input id="statePensionToday" type="text" inputmode="numeric" />
          </div>
        </div>

        <div class="button-row">
          <button id="runBtn" type="button">Run simulation</button>
          <button id="resetBtn" type="button">Reset to defaults</button>
        </div>

        <div id="errorBox" class="error-box" role="alert" aria-live="polite"></div>
      </section>

      <section class="panel">
        <h2>View options</h2>

        <div class="button-row">
          <button id="valueModeBtn" type="button">Show real values</button>
          <button id="toggleTableBtn" type="button">Show yearly detail</button>
        </div>
      </section>

      <section id="summary" class="summary-grid"></section>

      <section class="chart-wrap">
        <h2>Spending vs Income vs Withdrawals</h2>
        <canvas id="cashflowChart"></canvas>
      </section>

      <section class="chart-wrap">
        <h2>Portfolio Paths</h2>
        <canvas id="portfolioChart"></canvas>
      </section>

      <section class="panel">
        <h2>Downside and Flexibility</h2>
        <div id="stressSummary" class="summary-grid"></div>
      </section>

      <section id="yearlyDetailSection" class="section" style="display: none;">
        <h2>Yearly detail</h2>
        <div id="results-table"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
