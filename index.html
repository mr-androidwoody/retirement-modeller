<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retirement Simulator V2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 24px;
        color: #111;
      }

      h1, h2 {
        margin-bottom: 12px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }

      .card {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 14px;
        background: #fafafa;
      }

      .card-title {
        font-size: 14px;
        color: #555;
        margin-bottom: 6px;
      }

      .card-value {
        font-size: 24px;
        font-weight: 700;
      }

      .chart-wrap {
        margin: 24px 0;
        padding: 16px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
      }

      .controls {
        margin: 20px 0 10px;
      }

      button {
        padding: 10px 14px;
        border: 1px solid #888;
        background: #f3f3f3;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #e9e9e9;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        font-size: 14px;
      }

      th,
      td {
        border: 1px solid #999;
        padding: 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f0f0f0;
      }

      .section {
        margin-top: 28px;
      }
    </style>
  </head>
  <body>
    <h1>Retirement Simulator V2</h1>

    <div id="summary" class="summary-grid"></div>

    <div class="chart-wrap">
      <h2>Spending vs Income vs Withdrawals</h2>
      <canvas id="cashflowChart"></canvas>
    </div>

    <div class="chart-wrap">
      <h2>Portfolio Paths</h2>
      <canvas id="portfolioChart"></canvas>
    </div>

    <div class="chart-wrap">
      <h2>Probability of Depletion by Year</h2>
      <canvas id="ruinChart"></canvas>
    </div>

    <div class="section">
      <div class="controls">
        <button id="toggleTableBtn">Show full timeline</button>
      </div>
      <div id="results-table"></div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
